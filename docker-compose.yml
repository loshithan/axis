services:
  # ── PostgreSQL Database ──
  db:
    image: pgvector/pgvector:pg16
    container_name: axis-db
    environment:
      POSTGRES_DB: axis
      POSTGRES_USER: axis_user
      POSTGRES_PASSWORD: axis_dev_password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axis_user -d axis"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: axis-backend
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
      - ./agents:/app/agents
      - ./configs:/app/configs
    environment:
      DATABASE_URL: postgresql+asyncpg://axis_user:axis_dev_password@db:5432/axis
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      AXIS_API_BASE: http://127.0.0.1:8001
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      ENVIRONMENT: development
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  # ── Next.js Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: axis-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001
    ports:
      - "3001:3001"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    command: npm run dev

volumes:
  pgdata:
